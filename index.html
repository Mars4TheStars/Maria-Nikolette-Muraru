<meta name="viewport" content="width=device-width, initial-scale=1">    

<head>
<style>
* {
  box-sizing: border-box;
}


/* Header */
header {
  padding: 10px;
  text-align: center;
  background: #2F9C95;
  color: white;
}


/* Top navigation bar */
.navbar {
  display: flex;
  background-color: #40C9A2;
}

/* Navigation bar links */
.navbar a {
  color: #E5F9E0;
  padding: 14px 20px;
  text-decoration: none;
  text-align: center;
}

/* Change color on hover */
.navbar a:hover {
  background-color: #2F9C95;
  color: #A3F7B5;
}


/* Column container */
.container {  
  display: flex;
  flex-wrap: wrap;
}

/* Sidebar/left column */
.side {
  flex: 30%;
  background-color: #2F9C95;
  padding: 20px;
}

/* Main column */
.main {
  flex: 70%;
  background-color:  #A3F7B5 ;
  padding: 20px;
}


/* Footer */
footer {
  padding: 20px;
   text-align: center;
  background: #E5F9E0;
}

/* Responsive layout - when the screen is less than 700px wide, make the two columns stack on top of each other instead of next to each other */
@media screen and (max-width: 700px) {
  .container, .navbar, .side, .main {   
    flex-direction: column;
  }
}





/* THE PARENT CONTAINER */
.social-container {
  display: flex;            /* Activates horizontal row layout */
  
  flex-direction: row;      /* Locks items onto a horizontal axis line */
  align-items: center;      /* Lines up the horizontal midpoints of both icons */
  gap: 20px;                /* Puts clean horizontal space between them */
}

.image-button {
      
      transition: transform 0.2s ease, opacity 0.2s ease;
      gap: 20px;     /* Defines the space between the two buttons */
      
    }

    /* Slight zoom and full brightness on hover */
    .image-button:hover {
      transform: scale(1.05);
      opacity: 0.9;
    }

    /* Removes default blue/purple border around linked images in older browsers */
    .image-button img {
      border: none;
      display: block;      
    }

    /* Sizing individual images cleanly in CSS */
.social-container .image-button:nth-child(1) img {
  width: 100px;             /* Target Discord width */
}

.social-container .image-button:nth-child(2) img {
  width: 80px;              /* Target Instagram width */
}


#grad1{
  background-image: linear-gradient(to top, #E5F9E0, #A3F7B5, #40C9A2, #2F9C95);
  background-color: #E5F9E0  ; /* For browsers that do not support gradients */
  min-height: 100vh;          /* Forces the element to take up the full screen height */
  background-attachment: fixed; /* Prevents the gradient from repeating if the page scrolls */
      }
  
    h1 {

    p {

    }





</style>
